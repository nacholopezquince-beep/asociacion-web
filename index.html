<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asociación de familiares del CPRPM Naranco</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --teal-900:#1E3634; --teal-700:#2B4A47; --teal-600:#365E5A; --teal-100:#E4EEEC;
    --gold-600:#C89B3C; --gold-500:#D9AE52; --gold-100:#F6EBD2;
    --cream:#FAF7F0; --card:#FFFFFF; --ink:#2B2B28; --ink-soft:#666158;
    --line:#E4DFD3; --brick:#B5654A; --brick-100:#F6E4DE; --sage:#EDF1E9;
    --green-ok:#4C7A4A; --green-ok-bg:#E7F1E5;
    --radius:10px; --shadow:0 1px 3px rgba(30,54,52,.08), 0 1px 2px rgba(30,54,52,.06);
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--cream); color:var(--ink); font-family:'Inter',sans-serif; font-size:15.5px; line-height:1.5; }
  h1,h2,h3{ font-family:'Fraunces',serif; font-weight:600; margin:0; color:var(--teal-900); }
  .app{ max-width:1180px; margin:0 auto; }
  header.top{ background:var(--teal-700); color:#fff; padding:22px 28px; border-bottom:5px solid var(--gold-500);
    display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
  header.top h1{ color:#fff; font-size:20px; }
  header.top .sub{ font-size:13px; color:#CFE0DD; margin-top:2px; }
  header.top .brand{ display:flex; align-items:center; gap:12px; }
  header.top .leaf{ width:38px; height:38px; border-radius:50%; background:var(--gold-500); display:flex; align-items:center; justify-content:center; color:var(--teal-900); font-family:'Fraunces',serif; font-weight:600; font-size:18px; flex-shrink:0; }
  header.top .userbox{ font-size:13px; color:#CFE0DD; display:flex; align-items:center; gap:10px; }

  nav.tabs{ display:flex; gap:4px; padding:10px 28px 0; background:var(--teal-700); flex-wrap:wrap; }
  nav.tabs button{ background:transparent; border:none; color:#CFE0DD; padding:10px 16px; font-size:14px; font-weight:500; cursor:pointer; border-radius:8px 8px 0 0; border-bottom:3px solid transparent; }
  nav.tabs button.active{ background:var(--cream); color:var(--teal-900); border-bottom:3px solid var(--gold-500); }
  nav.tabs button:disabled{ opacity:.45; cursor:default; }

  main{ padding:24px 28px 60px; }
  .panel{ display:none; } .panel.active{ display:block; }

  .section-title{ display:flex; align-items:center; justify-content:space-between; margin:0 0 16px; flex-wrap:wrap; gap:10px;}
  .card{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px; }

  table{ width:100%; border-collapse:collapse; font-size:14px; }
  th{ text-align:left; padding:9px 10px; border-bottom:2px solid var(--teal-700); color:var(--teal-900); font-weight:600; font-size:12.5px; text-transform:uppercase; letter-spacing:.03em; white-space:nowrap;}
  td{ padding:9px 10px; border-bottom:1px solid var(--line); vertical-align:middle;}
  tr:hover td{ background:var(--sage); }
  .tablewrap{ overflow-x:auto; }

  input[type=text], input[type=email], input[type=password], select{
    font-family:'Inter',sans-serif; font-size:14px; padding:9px 11px; border:1px solid var(--line);
    border-radius:7px; background:#fff; color:var(--ink); width:100%;
  }
  input:focus, select:focus{ outline:2px solid var(--gold-600); outline-offset:1px; border-color:var(--gold-600); }
  label{ font-size:12.5px; color:var(--ink-soft); font-weight:500; display:block; margin-bottom:4px; }
  .field{ margin-bottom:14px; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media (max-width:640px){ .grid2{ grid-template-columns:1fr; } header.top{padding:16px;} main{padding:16px;} }

  button.btn{ font-family:'Inter',sans-serif; font-weight:600; font-size:13.5px; padding:9px 16px; border-radius:7px; border:1px solid var(--teal-700); background:var(--teal-700); color:#fff; cursor:pointer; }
  button.btn:hover{ background:var(--teal-900); }
  button.btn.secondary{ background:#fff; color:var(--teal-700); }
  button.btn.secondary:hover{ background:var(--teal-100); }
  button.btn:disabled{ opacity:.5; cursor:default; }
  button.icon-btn{ background:none; border:none; cursor:pointer; color:var(--ink-soft); font-size:13px; padding:4px 6px; border-radius:5px; }
  button.icon-btn:hover{ background:var(--sage); color:var(--teal-900); }

  .pill{ display:inline-block; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:600; }
  .pill.si{ background:var(--green-ok-bg); color:var(--green-ok); }
  .pill.no{ background:var(--brick-100); color:var(--brick); }
  .metric{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow); }
  .metric .label{ font-size:12px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.03em; }
  .metric .value{ font-family:'Fraunces',serif; font-size:24px; color:var(--teal-900); margin-top:2px; }
  .metric.warn .value{ color:var(--brick); }
  .metric.ok .value{ color:var(--green-ok); }

  .modal-bg{ display:none; position:fixed; inset:0; background:rgba(30,54,52,.45); align-items:center; justify-content:center; z-index:50; padding:16px; }
  .modal-bg.open{ display:flex; }
  .modal{ background:#fff; border-radius:12px; padding:24px; max-width:520px; width:100%; max-height:88vh; overflow-y:auto; }
  .modal-actions{ display:flex; justify-content:flex-end; gap:8px; margin-top:16px; }
  .empty{ color:var(--ink-soft); font-style:italic; padding:20px; text-align:center; }
  .toast{
